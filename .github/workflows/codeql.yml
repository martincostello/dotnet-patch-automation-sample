name: codeql

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - main
      - dotnet-vnext
      - dotnet-nightly
  schedule:
    - cron: '0 6 * * MON'
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.event.repository.fork == false

    concurrency:
      group: '${{ github.workflow }}-${{ github.sha }}-${{ matrix.language }}'
      cancel-in-progress: false

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'actions', 'csharp', 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        build-mode: none
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        category: '/language:${{ matrix.language }}'

  codeql:
    if: ${{ !cancelled() }}
    needs: [ analysis ]
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    concurrency:
      group: ${{ github.workflow }}-${{ github.sha }}
      cancel-in-progress: false

    steps:
    - name: Report status
      shell: bash
      env:
        SCAN_SUCCESS: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
      run: |
        if [ "${SCAN_SUCCESS}" == "true" ]
        then
          echo 'CodeQL analysis successful ✅'
        else
          echo 'CodeQL analysis failed ❌'
          exit 1
        fi
